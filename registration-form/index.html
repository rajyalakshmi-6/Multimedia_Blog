<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <h1>Course Registration Form</h1>
    <form action="">
      <fieldset>
        <legend>Personal Details</legend>
        <table>
          <tr>
            <td><label for="fname">First Name</label></td>
            <td><input type="text" name="fname" id="fname" required /></td>
          </tr>
          <tr>
            <td><label for="sname">Surname</label></td>
            <td><input type="text" name="sname" id="sname" /></td>
          </tr>
          <tr>
            <td><label for="mob">Mobile Number</label></td>
            <td><input type="tel" name="mob" id="mob" required /></td>
          </tr>
          <tr>
            <td><label for="email">Email</label></td>
            <td>
              <input type="email" name="email" id="email" required /><br />
            </td>
          </tr>
          <tr>
            <td><label for="password">Password</label></td>
            <td>
              <input type="password" name="password" id="password" required />
            </td>
          </tr>
          <tr>
            <td><label for="cpassword">Conform Password</label></td>
            <td>
              <input type="password" name="cpassword" id="cpassword" required />
            </td>
          </tr>
          <tr>
            <td><label for="dob">Date of Birth :</label></td>
            <td><input type="date" name="dob" id="dob" required /></td>
          </tr>
          <tr>
            <td><label for="age">Age :</label></td>
            <td>
              <input
                type="number"
                required
                name="age"
                id=""
                age
                min="18"
                max="60"
              />
            </td>
          </tr>
          <tr>
            <!-- radio buttons -->
            <td><label for="g">Gender : </label></td>
            <td>
              <input type="radio" name="g" id="male" value="MALE" />
              <label for="male">Male</label>
              <input type="radio" name="g" value="FEMALE" />
              <label>Female</label>
              <input type="radio" name="g" value="OTHERS" />
              <label>others</label>
            </td>
          </tr>
          <tr>
            <!-- dropdown button so use select tag -->
            <td><label for="selectcountry">select country: </label></td>
            <td>
              <select name="selectcountry" required id="selectcountry">
                <option value="IND">INDIA</option>
                <option value="US">USA</option>
                <option value="RS">RUSSIA</option>
              </select>
            </td>
          </tr>
          <tr>
            <td>
              <!-- upload files -->
              <label for="upload">Upload your Resume</label>
            </td>
            <td><input type="file" name="upload" required id="upload" /></td>
          </tr>
          <tr>
            <td>
              <!-- feedback form -->
              <label for="feedback">Feedback</label>
            </td>
            <td>
              <textarea
                name="feedback"
                id="feedback"
                rows="4"
                cols="50"
              ></textarea>
            </td>
          </tr>
          <tr>
            <td><input type="submit" value="SUBMIT" /></td>
          </tr>
        </table>
      </fieldset>
    </form>
  </body>
</html>
